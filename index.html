<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Express Test Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container {
      width: 80%;
      max-width: 800px;
      margin: 50px auto;
      text-align: center;
      padding: 20px;
      border: 2px solid #ddd;
      border-radius: 10px;
    }

    h1 {
      margin-bottom: 15px;
    }

    p {
      margin-bottom: 15px;
    }

    ul {
      list-style-position: inside;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
    button:hover{
        background:gray;
        border-radius: 5px;
        color: aliceblue;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Express.js is Working!</h1>

    <p>If you can see this page, Express is successfully serving HTML files.</p>

    <h2>Test Checklist</h2>
    <ul>
      <li>Server is running</li>
      <li>HTML is being served</li>
      <li>JavaScript is working</li>
    </ul>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("message").textContent =
        "🎉 JavaScript is working!";
    }
  </script>
</body>
</html>
